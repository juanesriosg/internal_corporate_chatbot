name: API Container

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - app/**
      - mock_data/**
      - Dockerfile
      - pyproject.toml
      - .github/workflows/api-container.yml

permissions:
  contents: read
  packages: write

jobs:
  build-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/chatbot-api" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest

      - name: Check Azure deploy configuration
        id: azure_config
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          API_BASIC_USERNAME: ${{ secrets.API_BASIC_USERNAME }}
          API_BASIC_PASSWORD: ${{ secrets.API_BASIC_PASSWORD }}
        run: |
          if [ -n "$AZURE_CREDENTIALS" ] \
            && [ -n "$AZURE_CONTAINER_APP_NAME" ] \
            && [ -n "$AZURE_RESOURCE_GROUP" ] \
            && [ -n "$OPENAI_API_KEY" ] \
            && [ -n "$API_BASIC_USERNAME" ] \
            && [ -n "$API_BASIC_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::API image was published to GHCR. Azure deployment was skipped because Azure/OpenAI/API auth secrets or variables are not fully configured."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Azure
        if: steps.azure_config.outputs.enabled == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Azure Container Apps
        if: steps.azure_config.outputs.enabled == 'true'
        env:
          IMAGE: ${{ steps.image.outputs.name }}:${{ github.sha }}
          AZURE_CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          API_BASIC_USERNAME: ${{ secrets.API_BASIC_USERNAME }}
          API_BASIC_PASSWORD: ${{ secrets.API_BASIC_PASSWORD }}
          OPENAI_CHAT_MODEL: ${{ vars.OPENAI_CHAT_MODEL }}
          OPENAI_EMBEDDING_MODEL: ${{ vars.OPENAI_EMBEDDING_MODEL }}
          CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
        run: |
          az containerapp secret set \
            --name "$AZURE_CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --secrets \
              openai-api-key="$OPENAI_API_KEY" \
              api-basic-username="$API_BASIC_USERNAME" \
              api-basic-password="$API_BASIC_PASSWORD"

          az containerapp update \
            --name "$AZURE_CONTAINER_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "$IMAGE" \
            --set-env-vars \
              LLM_PROVIDER=openai \
              OPENAI_CHAT_MODEL="${OPENAI_CHAT_MODEL:-gpt-5.4-mini}" \
              OPENAI_EMBEDDING_MODEL="${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}" \
              API_AUTH_ENABLED=true \
              API_BASIC_USERNAME=secretref:api-basic-username \
              API_BASIC_PASSWORD=secretref:api-basic-password \
              OPENAI_API_KEY=secretref:openai-api-key \
              CORS_ALLOWED_ORIGINS="$CORS_ALLOWED_ORIGINS"
