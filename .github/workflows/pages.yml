name: Deploy Web UI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - web/**
      - .github/workflows/pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Generate static UI config
        env:
          CHATBOT_API_URL: ${{ vars.CHATBOT_API_URL }}
        run: |
          python - <<'PY'
          import json
          import os

          config = {"apiBaseUrl": os.environ.get("CHATBOT_API_URL", "")}
          with open("web/config.js", "w", encoding="utf-8") as handle:
              handle.write("window.CHATBOT_CONFIG = ")
              handle.write(json.dumps(config))
              handle.write(";\n")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
